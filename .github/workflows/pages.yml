name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 把要发布的文件挑出来到 _site/，排除大文件、本地脚本、源码无关文件
      - name: Stage site
        run: |
          mkdir _site
          # 课程站点必备
          cp -r index.html assets _site/
          # 不带 server.py / PDF / preview / 设计文档 / 测试 / .git
          # （它们要么巨大、要么跟前端运行无关）

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
